<script>
    // Email захист від Cloudflare
    (function() {
        const mailto = 'mailto:' + 'avoloshenko' + '@' + 'steelorbis.com';
        const el = document.getElementById('email-link');
        const el2 = document.getElementById('quick-email-link');
        if (el) el.href = mailto;
        if (el2) el2.href = mailto;
    })();

    // ПЕРЕКЛАДИ
    const translations = {
        en: {
            role: "Market Intelligence Head Division<br>Turkey/MENA, EU, CIS",
            call: "Call", email: "Email", whatsapp: "WhatsApp",
            mobile: "Mobile", emailLabel: "Email", website: "Website",
            addContact: "Add to Contacts", saved: "Saved!", dir: "ltr"
        },
        tr: {
            role: "Pazar İstihbarat Başkanı<br>Türkiye/MENA, AB, BDT",
            call: "Ara", email: "E-posta", whatsapp: "WhatsApp",
            mobile: "Mobil", emailLabel: "E-posta", website: "Web Sitesi",
            addContact: "Kişilere Ekle", saved: "Kaydedildi!", dir: "ltr"
        },
        zh: {
            role: "市场情报部门负责人<br>土耳其/中东北非、欧盟、独联体",
            call: "致电", email: "邮件", whatsapp: "WhatsApp",
            mobile: "手机", emailLabel: "邮箱", website: "网站",
            addContact: "添加联系人", saved: "已保存！", dir: "ltr"
        },
        ar: {
            role: "رئيس قسم استخبارات السوق<br>تركيا/الشرق الأوسط وشمال أفريقيا، الاتحاد الأوروبي، رابطة الدول المستقلة",
            call: "اتصال", email: "بريد", whatsapp: "واتساب",
            mobile: "جوال", emailLabel: "البريد الإلكتروني", website: "الموقع",
            addContact: "إضافة للجهات", saved: "تم الحفظ!", dir: "rtl"
        }
    };

    function setLanguage(lang) {
        const t = translations[lang];
        document.documentElement.lang = lang;
        document.body.dir = t.dir;
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (t[key] !== undefined) el.innerHTML = t[key];
        });
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.lang === lang);
        });
    }

    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', () => setLanguage(btn.dataset.lang));
    });

    // КНОПКА ADD TO CONTACTS
    document.getElementById('save-contact').addEventListener('click', function(e) {
        const btn = this;
        if (navigator.vibrate) navigator.vibrate(50);

        const ripple = document.createElement('span');
        ripple.classList.add('ripple');
        const rect = btn.getBoundingClientRect();
        const size = Math.max(rect.width, rect.height);
        ripple.style.width = ripple.style.height = size + 'px';
        ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
        ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
        btn.appendChild(ripple);
        setTimeout(() => ripple.remove(), 600);

        const vcard =
            "BEGIN:VCARD\n" +
            "VERSION:3.0\n" +
            "N:Voloshenko;Anna;;;\n" +
            "FN:Anna Voloshenko\n" +
            "ORG:SteelOrbis\n" +
            "TITLE:Market Intelligence Head Division - Turkey/MENA, EU, CIS\n" +
            "TEL;TYPE=CELL,VOICE:+905309696679\n" +
            "EMAIL;TYPE=WORK,INTERNET:avoloshenko@steelorbis.com\n" +
            "URL:https://www.steelorbis.com\n" +
            "END:VCARD";

        const blob = new Blob([vcard], { type: 'text/vcard' });
        const url = window.URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.download = "Anna_Voloshenko.vcf";
        link.href = url;
        link.click();
        window.URL.revokeObjectURL(url);

        btn.classList.add('saved');
        setTimeout(() => btn.classList.remove('saved'), 3000);
    });
</script>
