    <style>
        :root {
            --so-blue: #003366;
            --so-red: #ea5c00;
            --text-light: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            margin: 0; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle at top, var(--so-blue), #001021);
            color: var(--text-light);
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 360px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 30px 24px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid var(--so-red);
        }

        /* ✅ Мовний перемикач */
        .lang-switcher {
            display: flex;
            justify-content: flex-end;
            gap: 6px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .lang-btn {
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            background: transparent;
            color: rgba(255,255,255,0.6);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.5px;
        }
        .lang-btn:hover { background: rgba(255,255,255,0.1); color: white; }
        .lang-btn.active {
            background: var(--so-red);
            border-color: var(--so-red);
            color: white;
        }

        .avatar {
            width: 100px; height: 100px; border-radius: 50%;
            margin: 0 auto 20px; background: white;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid var(--so-red); overflow: hidden;
            padding: 8px;
            box-shadow: 0 0 15px rgba(204, 0, 0, 0.3);
        }

        h1 { margin: 0; font-size: 24px; letter-spacing: -0.5px; }

        .role {
            font-size: 13px;
            color: var(--so-red);
            font-weight: 700;
            margin: 8px 0 25px 0;
            line-height: 1.4;
            text-transform: uppercase;
        }

        .quick-links {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            border-top: 1px solid rgba(255,255,255,0.1);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin: 0 -24px 25px;
        }

        .quick-btn {
            display: flex; flex-direction: column; align-items: center;
            padding: 15px 5px; text-decoration: none; color: white;
            font-size: 10px; font-weight: bold; text-transform: uppercase;
            transition: background 0.3s;
        }
        .quick-btn:not(:last-child) { border-right: 1px solid rgba(255,255,255,0.1); }
        .quick-btn:hover { background: rgba(255, 255, 255, 0.1); }
        .quick-btn .icon { margin-bottom: 5px; color: var(--so-red); }

        .contact-item {
            display: flex; align-items: center; gap: 15px;
            margin-bottom: 15px; text-decoration: none; color: inherit;
            padding: 12px; border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            text-align: left;
        }
        .contact-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(5px);
            border-color: var(--so-red);
        }

        .info-block { display: flex; flex-direction: column; }
        .value { font-size: 14px; font-weight: 600; }
        .label { font-size: 11px; opacity: 0.6; margin-top: 2px; text-transform: uppercase; }

        /* ✅ SVG Sprite — всі іконки в одному місці, без дублювання */
        .icon { width: 20px; height: 20px; color: var(--so-red); flex-shrink: 0; }
        .icon svg { width: 100%; height: 100%; fill: currentColor; }

        /* ✅ Кнопка з анімацією та haptic feedback */
        .btn-save {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            margin-top: 10px; padding: 12px 15px; border-radius: 12px;
            background: var(--so-red); color: white;
            text-decoration: none; font-weight: bold;
            box-shadow: 0 10px 20px rgba(204, 0, 0, 0.3);
            transition: transform 0.2s, background 0.3s;
            cursor: pointer;
            border: none;
            width: 100%;
            font-size: 14px;
            position: relative;
            overflow: hidden;
        }
        .btn-save:active { transform: scale(0.97); }

        /* Ripple ефект */
        .btn-save .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: scale(0);
            animation: ripple-anim 0.5s linear;
            pointer-events: none;
        }
        @keyframes ripple-anim {
            to { transform: scale(4); opacity: 0; }
        }

        /* Стан "збережено" */
        .btn-save.saved {
            background: #2e7d32;
            box-shadow: 0 10px 20px rgba(46,125,50,0.3);
        }
        .btn-save .btn-text { transition: opacity 0.2s; display: flex; align-items: center; gap: 10px; justify-content: center; }
        .btn-save .btn-check { display: none; align-items: center; gap: 10px; justify-content: center; }
        .btn-save.saved .btn-text { display: none; }
        .btn-save.saved .btn-check { display: flex; align-items: center; gap: 10px; }

        /* Arabic RTL */
        [dir="rtl"] .contact-item:hover { transform: translateX(-5px); }
        [dir="rtl"] .lang-switcher { justify-content: flex-start; }
    </style>

        const translations = {

                whatsapp: "واتساب",
                mobile: "جوال",
                emailLabel: "البريد الإلكتروني",
                website: "الموقع",
                addContact: "إضافة للجهات",
                saved: "تم الحفظ!",
                dir: "rtl"
            }
        };

        let currentLang = 'en';

        function setLanguage(lang) {
            currentLang = lang;
            const t = translations[lang];
            document.documentElement.lang = lang;
            document.body.dir = t.dir;

            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key] !== undefined) el.innerHTML = t[key];
            });

            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });
        }

        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => setLanguage(btn.dataset.lang));
        });

        // ============================================================
        // ✅ КНОПКА ADD TO CONTACTS: ripple + haptic + анімація
        // ============================================================
        document.getElementById('save-contact').addEventListener('click', function (e) {
            const btn = this;

            // Haptic feedback (вібрація на мобільних)
            if (navigator.vibrate) navigator.vibrate(50);

            // Ripple ефект
            const ripple = document.createElement('span');
            ripple.classList.add('ripple');
            const rect = btn.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
            ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
            btn.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);

            // Генерація vCard
            const vcard =
                "BEGIN:VCARD\n" +
                "VERSION:3.0\n" +
                "N:Voloshenko;Anna;;;\n" +
                "FN:Anna Voloshenko\n" +
                "ORG:SteelOrbis\n" +
                "TITLE:Market Intelligence Head Division - Turkey/MENA, EU, CIS\n" +
                "TEL;TYPE=CELL,VOICE:+905309696679\n" +
                "EMAIL;TYPE=WORK,INTERNET:avoloshenko@steelorbis.com\n" +
                "URL:https://www.steelorbis.com\n" +
                "END:VCARD";

            const blob = new Blob([vcard], { type: 'text/vcard' });
            const url = window.URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.download = "Anna_Voloshenko.vcf";
            link.href = ur
